name: ci-run-docs-interop

on:
  pull_request:
    paths:
      - 'docs/snippets/**/*interop*'
      - 'src/**'
      - 'scripts/interop-setup.ts'
      - '.github/workflows/ci-docs-interop.yaml'
  push:
    branches:
      - main
      - vi/interop-tests # Branch for interop tests development
  workflow_dispatch:

concurrency:
  group: docs-interop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  interop-snippets:
    name: interop-snippets (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "docs/snippets/ethers/guides/interop-guide.test.ts"
          - "docs/snippets/ethers/reference/interop.test.ts"
          - "docs/snippets/viem/guides/interop-guide.test.ts"
          - "docs/snippets/viem/reference/interop.test.ts"

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends lcov

      - name: Install Foundry (anvil)
        uses: foundry-rs/foundry-toolchain@8b0419c685ef46cb79ec93fbdc131174afceb730 # v1.6.0
        with:
          version: v1.5.1

      - name: Run ZKsync OS (multi-chain)
        uses: matter-labs/zksync-server-action@6632ab9a6bd841c7849e8d62a4984734e018d89f # v0.1.1
        with:
          version: v0.19.0
          protocol_version: v31.0
          setup: multi_chain
          l2_ports: |
            506: 3052
            6565: 3050
            6566: 3051

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.0.2
        with:
          bun-version: '1.3.11'

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Set up interop environment
        env:
          L1_RPC: http://localhost:8545
          GW_RPC: http://localhost:3052
          SRC_L2_RPC: http://localhost:3050
          DST_L2_RPC: http://localhost:3051
          PRIVATE_KEY: '0x7726827caac94a7f9e1b160f7ea819f172f7b6f9d2a97f992c38edeab82d4110'
        run: |
          set -eo pipefail
          bun run scripts/interop-setup.ts >> "$GITHUB_ENV"

      - name: Run interop snippet tests
        env:
          L1_RPC: http://localhost:8545
          GW_RPC: http://localhost:3052
          SRC_L2_RPC: http://localhost:3050
          DST_L2_RPC: http://localhost:3051
          PRIVATE_KEY: '0x7726827caac94a7f9e1b160f7ea819f172f7b6f9d2a97f992c38edeab82d4110'
        run: |
          bun test ${{ matrix.suite }} --timeout 2400000
